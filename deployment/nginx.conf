server {
    listen 80;
    server_name www.yourdomain.com yourdomain.com;

    # Nginx reverse proxy configuration to pass traffic to Gunicorn or Docker on port 5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs_from;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Required for potentially interacting real-time, or large file uploads)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Extends proxy timeout to allow for Gemini asynchronous calls that take a long time over 60s
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # Optional: Serve Static files directly with Nginx instead of passing via Flask
    location /static/ {
        # Modify this pathway strictly pointing towards your absolute directory
        alias /var/www/faq_generator/frontend/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Allow users to upload large files (e.g. 50MB)
    client_max_body_size 50M;
}
